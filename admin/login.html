<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Initial Care</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="../images/logo.png">
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-panel">
    <a href="../index.html" class="auth-back">
      <svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to homepage
    </a>

    <div class="auth-brand">
      <span class="auth-brand-label">Initial Care</span>
      <span class="auth-badge">Admin</span>
    </div>
    <h1>Welcome back</h1>
    <p class="lede">Sign in to your Initial Care admin account.</p>

    <form id="login-form">
      <div class="auth-field">
        <label for="f-username">Username or email</label>
        <div class="auth-input-wrap">
          <svg class="icon-left" viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 6l6 5 6-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input id="f-username" name="username" type="text" placeholder="you@example.com" required autofocus autocomplete="username">
        </div>
      </div>
      <div class="auth-field">
        <label for="f-password">Password</label>
        <div class="auth-input-wrap has-toggle">
          <svg class="icon-left" viewBox="0 0 20 20" fill="none"><rect x="5" y="9" width="10" height="7" rx="1.3" stroke="currentColor" stroke-width="1.3"/><path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <input id="f-password" name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="toggle-visibility" id="toggle-password" aria-label="Show password">
            <svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M2 10s3-5.5 8-5.5 8 5.5 8 5.5-3 5.5-8 5.5-8-5.5-8-5.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="10" cy="10" r="2.3" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
        </div>
      </div>
      <div class="auth-row">
        <label class="auth-checkbox">
          <input type="checkbox" id="f-remember" name="remember">
          Remember me
        </label>
        <a href="forgot-password.html">Forgot password?</a>
      </div>
      <button type="submit" class="btn brass auth-submit">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M10 17s-6-3.8-6-8.1C4 6.7 5.6 5 7.6 5c1.1 0 2.1.5 2.4 1.4C10.3 5.5 11.3 5 12.4 5c2 0 3.6 1.7 3.6 3.9 0 4.3-6 8.1-6 8.1z"/></svg>
        Sign In
        <svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <p class="form-error" style="display:none; color:#a3372e; font-weight:600; text-align:center; margin-top:1em;"></p>
    </form>
  </div>
</div>

<script>
(function () {
  var form = document.getElementById('login-form');
  var toggleBtn = document.getElementById('toggle-password');
  var passwordInput = document.getElementById('f-password');

  var eyeOpen = '<svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M2 10s3-5.5 8-5.5 8 5.5 8 5.5-3 5.5-8 5.5-8-5.5-8-5.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="10" cy="10" r="2.3" stroke="currentColor" stroke-width="1.3"/></svg>';
  var eyeClosed = '<svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M2 10s3-5.5 8-5.5 8 5.5 8 5.5-3 5.5-8 5.5-8-5.5-8-5.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="10" cy="10" r="2.3" stroke="currentColor" stroke-width="1.3"/><path d="M3 3l14 14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>';

  toggleBtn.addEventListener('click', function () {
    var isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    toggleBtn.innerHTML = isPassword ? eyeClosed : eyeOpen;
    toggleBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var error = form.querySelector('.form-error');
    var button = form.querySelector('button[type="submit"]');
    error.style.display = 'none';
    button.disabled = true;

    fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: form.username.value,
        password: form.password.value,
        remember: form.remember.checked,
      }),
    })
      .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
      .then(function (result) {
        if (result.ok) {
          window.location.href = 'dashboard.html';
        } else {
          error.textContent = result.data.error || 'Login failed.';
          error.style.display = 'block';
          button.disabled = false;
        }
      })
      .catch(function () {
        error.textContent = 'Something went wrong. Please try again.';
        error.style.display = 'block';
        button.disabled = false;
      });
  });
})();
</script>
</body>
</html>

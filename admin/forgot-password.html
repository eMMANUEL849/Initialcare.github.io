<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Initial Care</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="../images/logo.png">
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-panel">
    <a href="login.html" class="auth-back">
      <svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to login
    </a>

    <h1>Forgot your password?</h1>
    <p class="lede">Enter your username or email and we'll send you a link to reset it.</p>

    <form id="forgot-form">
      <div class="auth-field">
        <label for="f-identifier">Username or email</label>
        <div class="auth-input-wrap">
          <svg class="icon-left" viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 6l6 5 6-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input id="f-identifier" name="identifier" type="text" placeholder="you@example.com" required autofocus>
        </div>
      </div>
      <button type="submit" class="btn brass auth-submit">Send reset link</button>
      <p class="form-error" style="display:none; color:#a3372e; font-weight:600; text-align:center; margin-top:1em;"></p>
      <p class="form-note" style="display:none; color:var(--forest-deep); font-weight:600; text-align:center; margin-top:1em;"></p>
    </form>
  </div>
</div>

<script>
(function () {
  var form = document.getElementById('forgot-form');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var error = form.querySelector('.form-error');
    var note = form.querySelector('.form-note');
    var button = form.querySelector('button[type="submit"]');
    error.style.display = 'none';
    note.style.display = 'none';
    button.disabled = true;

    fetch('/api/admin/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier: form.identifier.value }),
    })
      .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
      .then(function (result) {
        if (result.ok) {
          note.textContent = result.data.message || "If that account exists, we've sent a reset link.";
          note.style.display = 'block';
          form.querySelector('input').value = '';
        } else {
          error.textContent = result.data.error || 'Something went wrong.';
          error.style.display = 'block';
        }
        button.disabled = false;
      })
      .catch(function () {
        error.textContent = 'Something went wrong. Please try again.';
        error.style.display = 'block';
        button.disabled = false;
      });
  });
})();
</script>
</body>
</html>

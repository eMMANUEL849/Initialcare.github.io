<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Initial Care</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="../images/logo.png">
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-panel">
    <a href="login.html" class="auth-back">
      <svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to login
    </a>

    <h1>Set a new password</h1>
    <p class="lede">Choose a new password for your Initial Care admin account.</p>

    <form id="reset-form">
      <div class="auth-field">
        <label for="f-password">New password</label>
        <div class="auth-input-wrap has-toggle">
          <svg class="icon-left" viewBox="0 0 20 20" fill="none"><rect x="5" y="9" width="10" height="7" rx="1.3" stroke="currentColor" stroke-width="1.3"/><path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <input id="f-password" name="password" type="password" placeholder="At least 8 characters" required minlength="8" autofocus autocomplete="new-password">
          <button type="button" class="toggle-visibility" id="toggle-password" aria-label="Show password">
            <svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M2 10s3-5.5 8-5.5 8 5.5 8 5.5-3 5.5-8 5.5-8-5.5-8-5.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="10" cy="10" r="2.3" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
        </div>
      </div>
      <div class="auth-field">
        <label for="f-confirm">Confirm new password</label>
        <div class="auth-input-wrap">
          <svg class="icon-left" viewBox="0 0 20 20" fill="none"><rect x="5" y="9" width="10" height="7" rx="1.3" stroke="currentColor" stroke-width="1.3"/><path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <input id="f-confirm" name="confirm" type="password" placeholder="Retype your new password" required minlength="8" autocomplete="new-password">
        </div>
      </div>
      <button type="submit" class="btn brass auth-submit">Reset password</button>
      <p class="form-error" style="display:none; color:#a3372e; font-weight:600; text-align:center; margin-top:1em;"></p>
      <p class="form-note" style="display:none; color:var(--forest-deep); font-weight:600; text-align:center; margin-top:1em;"></p>
    </form>
  </div>
</div>

<script>
(function () {
  var form = document.getElementById('reset-form');
  var toggleBtn = document.getElementById('toggle-password');
  var passwordInput = document.getElementById('f-password');
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');

  var eyeOpen = '<svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M2 10s3-5.5 8-5.5 8 5.5 8 5.5-3 5.5-8 5.5-8-5.5-8-5.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="10" cy="10" r="2.3" stroke="currentColor" stroke-width="1.3"/></svg>';
  var eyeClosed = '<svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M2 10s3-5.5 8-5.5 8 5.5 8 5.5-3 5.5-8 5.5-8-5.5-8-5.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="10" cy="10" r="2.3" stroke="currentColor" stroke-width="1.3"/><path d="M3 3l14 14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>';

  toggleBtn.addEventListener('click', function () {
    var isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    toggleBtn.innerHTML = isPassword ? eyeClosed : eyeOpen;
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var error = form.querySelector('.form-error');
    var note = form.querySelector('.form-note');
    var button = form.querySelector('button[type="submit"]');
    error.style.display = 'none';
    note.style.display = 'none';

    if (!token) {
      error.textContent = 'This reset link is missing its token. Please request a new one.';
      error.style.display = 'block';
      return;
    }
    if (form.password.value !== form.confirm.value) {
      error.textContent = 'Passwords do not match.';
      error.style.display = 'block';
      return;
    }

    button.disabled = true;
    fetch('/api/admin/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, password: form.password.value }),
    })
      .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
      .then(function (result) {
        if (result.ok) {
          note.textContent = 'Password reset — redirecting you to log in…';
          note.style.display = 'block';
          setTimeout(function () { window.location.href = 'login.html'; }, 1500);
        } else {
          error.textContent = result.data.error || 'Something went wrong.';
          error.style.display = 'block';
          button.disabled = false;
        }
      })
      .catch(function () {
        error.textContent = 'Something went wrong. Please try again.';
        error.style.display = 'block';
        button.disabled = false;
      });
  });
})();
</script>
</body>
</html>
